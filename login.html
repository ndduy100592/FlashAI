<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - FlashAI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            font-family: 'Inter', system-ui, Avenir, Helvetica, Arial, sans-serif;
            line-height: 1.5; font-weight: 400; color-scheme: light; color: #333;
            font-synthesis: none; text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background-image: url('background.jpg');
            background-size: cover; background-position: center center;
            background-repeat: no-repeat; background-attachment: fixed; position: relative;
        }
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,30,80,0.52); z-index: 0;
        }
        .login-container {
            background-color: white; border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25); padding: 44px 40px;
            width: 100%; max-width: 440px; border: 2px solid rgba(37,99,235,0.35);
            transition: transform 0.3s ease; position: relative; z-index: 1;
        }
        .login-container:hover { transform: translateY(-5px); }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo .logo-icon { font-size: 52px; color: #2563eb; display: block; margin-bottom: 6px; }
        .logo h1 { color: #2563eb; margin: 8px 0 4px; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .welcome-text { text-align: center; color: #555; margin-bottom: 28px; font-size: 15px; line-height: 1.6; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e3a6e; font-size: 0.92rem; }
        input {
            width: 100%; padding: 14px 16px; border: 2px solid #dbeafe; border-radius: 14px;
            box-sizing: border-box; font-size: 16px; transition: all 0.25s ease; background-color: white; font-family: inherit;
        }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,0.15); }
        button {
            width: 100%; padding: 14px;
            background: linear-gradient(105deg, #2563eb 0%, #1d4ed8 100%);
            color: white; border: none; border-radius: 40px; cursor: pointer;
            font-size: 17px; font-weight: 700; margin-top: 10px; transition: all 0.25s ease;
            box-shadow: 0 6px 18px rgba(37,99,235,0.35); letter-spacing: 0.3px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(37,99,235,0.45); background: linear-gradient(105deg, #3b82f6 0%, #2563eb 100%); }
        button:active { transform: translateY(1px); }
        button:disabled { opacity: 0.75; cursor: not-allowed; transform: none; }
        .links { text-align: center; margin-top: 24px; }
        .links a {
            color: #2563eb; text-decoration: none; font-weight: 600; transition: all 0.2s;
            display: block; margin: 10px 0; font-size: 0.92rem;
        }
        .links a:hover { color: #1d4ed8; text-decoration: underline; }
        .error {
            color: #d32f2f; margin-top: 16px; text-align: center; padding: 12px;
            background-color: #ffeaea; border-radius: 12px; border-left: 4px solid #ff4d4d;
            font-size: 14px; font-weight: 500;
        }
        @media (max-width: 480px) {
            .login-container { margin: 20px; padding: 32px 22px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fa-solid fa-bolt-lightning logo-icon"></i>
            <h1>FlashAI</h1>
            <div class="welcome-text">Lật thẻ thông minh - Chinh phục tiếng Anh cùng AI</div>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" required placeholder="Nhập email của bạn" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">🔒 Mật khẩu</label>
                <input type="password" id="password" required placeholder="Nhập mật khẩu" autocomplete="current-password">
            </div>
            <button type="submit" id="loginBtn">Đăng nhập</button>
            <div class="links">
                <a href="register.html">Chưa có tài khoản? Đăng ký ngay</a>
                <a href="index.html">← Quay lại trang chủ</a>
            </div>
        </form>
        <div id="errorMessage" class="error" style="display:none;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFt47TgrNSI7dbk-rYw7N4gciLb37P08w",
            authDomain: "duyaaaa-57201.firebaseapp.com",
            projectId: "duyaaaa-57201",
            storageBucket: "duyaaaa-57201.firebasestorage.app",
            messagingSenderId: "124502081437",
            appId: "1:124502081437:web:96e28810068e32f7abb974",
            measurementId: "G-10YX70CFYP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const btn = document.getElementById('loginBtn');
            errorMessage.style.display = 'none';
            btn.textContent = 'Đang đăng nhập...';
            btn.disabled = true;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => { window.location.href = 'main.html'; })
                .catch((error) => {
                    errorMessage.textContent = error.message;
                    errorMessage.style.display = 'block';
                    btn.textContent = 'Đăng nhập';
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
